<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        .container {
            width: 240px;
            border: 1px solid rgb(211, 198, 198);
            border-radius: 10px;
            margin: auto;
            margin-top: 100px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            padding: 20px;
        }

        #num {
            width: 90%;
            height: 20%;
            border: none;
            background-color: white;
            text-align: right;
            font-size: 20px;
            color: rgb(19, 67, 139);

        }

        .btn {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            margin-top: 70px;
            gap: 15px;
        }

        button {
            width: 28px;
            height: 30px;
            border-radius: 50%;
            border: none;
            font-size: 15px;
        }

        .del {
            color: rgb(150, 13, 36);
        }

        .blue {
            color: rgb(19, 67, 139);
        }

        .pink {
            color: rgb(201, 111, 126);
        }

        .equ {
            background-color: pink;
            color: white;
        }
    </style>
</head>

<body>
    <div class="container">
        <input type="text" id="num" value="0">
        <div class="btn">
            <button class="del" onclick="allClear()">C</button>
            <button class="del" onclick="deleteLast()">⌫</button>
            <button class="blue" onclick="addValue('%')">%</button>
            <button class="pink" onclick="addValue('/')">÷</button>

            <button class="blue" onclick="addValue(7)">7</button>
            <button class="blue" onclick="addValue(8)">8</button>
            <button class="blue" onclick="addValue(9)">9</button>
            <button class="pink" onclick="addValue('*')">×</button>

            <button class="blue" onclick="addValue(4)">4</button>
            <button class="blue" onclick="addValue(5)">5</button>
            <button class="blue" onclick="addValue(6)">6</button>
            <button class="pink" onclick="addValue('-')">-</button>

            <button class="blue" onclick="addValue(1)">1</button>
            <button class="blue" onclick="addValue(2)">2</button>
            <button class="blue" onclick="addValue(3)">3</button>
            <button class="pink" onclick="addValue('+')">+</button>

            <button class="blue" onclick="addParenthesis()">()</button>
            <button class="blue" onclick="addValue(0)">0</button>
            <button class="blue" onclick="addValue('.')">.</button>
            <button class="equ" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        let ans = document.getElementById("num");
        function addValue(data) {
            if (ans.value === '0') {
                ans.value = data;
            } else {
                ans.value += data;
            }
        }
        function addParenthesis() {
            const value = ans.value;
            const openCount = (value.match(/\(/g) || []).length;
            const closeCount = (value.match(/\)/g) || []).length;
            const lastChar = value[value.length - 1];
            const canClose = openCount > closeCount;
            const isNumberOrClose = /[0-9)]$/.test(value);
            const isOperator = /[+\-*/%]$/.test(value);

            if (value === '0' || isOperator || lastChar === '(') {
                ans.value = value === '0' ? '(' : value + '(';
            } else if (canClose && isNumberOrClose) {
                ans.value = value + ')';
            } else if (isNumberOrClose) {
                ans.value = value + '*(';
            } else {
                ans.value += '(';
            }
        }
        function allClear() {
            ans.value = "0";
        }
        function deleteLast() {
            ans.value = ans.value.slice(0, -1) || "0";
        }
        function calculate() {
            ans.value = eval(ans.value);
        }
    </script>

</body>

</html>
