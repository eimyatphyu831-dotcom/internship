<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: auto;
        }

        table {
            width: 50%;
            border: 1px outset black;
            border-collapse: collapse;
            margin-top: 50px;
            /* text-align: center; */
            /* margin: 30px 20px; */
        }

        th {
            background-color: rgb(85, 135, 193);
            text-align: center;
        }

        /* td{ 
            background-color: rgb(50, 137, 171);
          
        /* } */
        .num {
            text-align: center;
        }

        .gen {
            text-align: center;
        }

        .mark {
            text-align: right;
        }
    </style>
</head>

<body>
    <table border="1">

            <th rowspan="2">Student Name</th>
            <th rowspan="2" class="gender">Gender</th>

            <th colspan="3">Marks</th>

        </tr>

            <th>English</th>

        </tr>
        <tr>

            <td>Su Su</td>

            <td>5CS-32</td>
            <td class="mark">60</td>
            <td class="mark">75</td>
            <td class="mark">86</td>
        </tr>
        <tr>
            <td class="num">2</td>
            <td>Moe Moe</td>
            <!-- <td>Female</td> -->

            <td class="mark">78</td>

        </tr>
        <tr>
            <td class="num">3</td>
            <td>Kyaw Kyaw</td>
            <td rowspan="3" class="gen">Male</td>
            <td>5CS-34</td>
            <td class="mark">89</td>
            <td class="mark">43</td>
            <td class="mark">86</td>
        </tr>
        <tr>
            <td class="num">4</td>

        <tr>

            <td>5CS-36</td>
            <td class="mark">87</td>
            <td class="mark">75</td>
            <td class="mark">86</td>
        </tr>
    </table>
</body>

</html>
