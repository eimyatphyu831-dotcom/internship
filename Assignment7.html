<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment7</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div class="w-full min-h-screen flex flex-col p-4">
        <h1 class="text-3xl font-bold px-2">Tailwind Utility Simulator</h1>
        <p class="text-sm text-gray-400 px-2 mb-4">Change the inputs below to see how atomic classes combine to build UIs.</p>
        
        <!-- Responsive Nav Bar (Added 'relative' so absolute children position correctly) -->
        <nav class="sticky top-0 w-full bg-gray-800 text-white flex flex-wrap items-center justify-between p-3 shadow-md mb-6 ">
            <h1 class="text-xl font-bold px-2">MyLogo</h1>
            
            <!-- Mobile Menu Button -->
            <button id="menu-btn" class="block md:hidden focus:outline-none hover:text-gray-300 px-2">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://w3.org">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>

            <!-- Navigation Links (Changed to 'absolute' on mobile so it overlays over the features) -->
            <div id="menu-links" class="absolute top-full left-0 right-0 w-full bg-gray-800 flex flex-col p-4 gap-6 border-t border-gray-700 shadow-xl md:static md:flex md:flex-row md:w-auto md:border-none md:p-0 md:shadow-none md:mt-0 px-4">
                <a href="" class="hover:text-blue-400 py-1 transition-colors">Home</a>
                <a href="" class="hover:text-blue-400 py-1 transition-colors">About</a>
                <a href="" class="hover:text-blue-400 py-1 transition-colors">Contact</a>
            </div>
        </nav>

        <!-- Responsive Grid for Features -->
        <div class="w-full grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <h4 class="w-full bg-slate-400 rounded-lg p-4 text-center transition-transform hover:scale-105 cursor-pointer">Feature 1</h4>
            <h4 class="w-full bg-slate-400 rounded-lg p-4 text-center transition-transform hover:scale-105 cursor-pointer">Feature 2</h4>
            <h4 class="w-full bg-slate-400 rounded-lg p-4 text-center transition-transform hover:scale-105 cursor-pointer">Feature 3</h4>
        </div>

        <!-- Main Workspace -->
        <div class="w-full flex flex-col md:flex-row gap-4 mb-6">
            <!-- Left Panel: Controls -->
            <section class="bg-slate-200 border-2 rounded-lg flex flex-col p-4 gap-4 w-full md:w-1/2 min-h-[480px] shadow-md">
                <h3 class="font-bold text-lg">Utility Controls</h3>
                
                <label class="font-medium" for="padding">Padding (Spacing)</label>
                <select class="p-2 rounded border bg-white"><option>Medium (p-8)</option></select>
                
                <label class="font-medium" for="bgtheme">Background Theme (Colors)</label>
                <select class="p-2 rounded border bg-white"><option>Primary Blue</option></select>
                
                <label class="font-medium" for="txtsize">Text Size (Typography)</label>
                <select class="p-2 rounded border bg-white"><option>Large (text-xl)</option></select>
                
                <label class="font-medium" for="corner">Corner Radius (Borders)</label>
                <select class="p-2 rounded border bg-white"><option>Square (rounded-none)</option></select>
                
                <label class="font-medium" for="shadow">Shadow (Depth)</label>
                <select class="p-2 rounded border bg-white"><option>Medium (shadow-md)</option></select>
            </section>
            
            <!-- Right Panel: Preview & Code -->
            <div class="w-full md:w-1/2 flex flex-col gap-4">
                <section class="w-full h-[285px] bg-slate-400 border rounded-md flex justify-center items-center p-4 shadow-md">
                    <div class="bg-blue-600 rounded-md max-w-[300px] w-full p-4">
                        <h3 class="text-white text-xl font-semibold">Alex Walker</h3>
                        <p class="text-white text-sm mt-1">Full-Stack Web Developer building awesome things with Tailwind CSS.</p>
                    </div>
                </section>
                
                <section class="rounded-md w-full min-h-[250px] bg-black p-4 flex flex-col shadow-md justify-between">
                    <button class="text-white text-sm rounded bg-gray-500 hover:bg-blue-600 px-3 py-1.5 self-end" id="btn">HTML Output</button>
                    <pre class="text-md text-green-400 whitespace-pre-wrap mt-2 overflow-x-auto" id="output"></pre>
                </section>
            </div>
        </div>

        <!-- Footer Action Section -->
        <section class="flex flex-wrap gap-2 justify-center md:justify-start pb-8">
            <button class="hover:bg-blue-700 bg-blue-600 text-white font-medium rounded px-4 py-2 transition-colors">Submit</button>
            <button class="hover:bg-blue-50 hover:text-blue-600 bg-white border-2 border-blue-500 rounded px-4 py-2 text-blue-500 font-medium transition-colors">Read More</button>
            <button class="hover:bg-blue-700 bg-blue-600 text-white font-medium rounded px-4 py-2 transition-colors duration-500">Hover Me Slowly!</button>
        </section>
    </div>

    <script>
        const btn = document.getElementById("btn");
        const output = document.getElementById("output");
        const sampleCode = "<div class='bg-blue-600 rounded-md w-[300px] p-4'>\n  <h3 class='text-white text-xl'>Alex Walker</h3>\n  <p class='text-white'>Full-Stack Web Developer building awesome things with Tailwind CSS.</p>\n</div>";

        btn.addEventListener("click", function () {
            if (output.innerText === "") {
                output.innerText = sampleCode;
                btn.innerText = "Hide HTML";
            } else {
                output.innerText = "";
                btn.innerText = "HTML Output";
            }
        });

        const menuBtn = document.getElementById("menu-btn");
        const menuLinks = document.getElementById("menu-links");

        menuBtn.addEventListener("click", function () {
            menuLinks.classList.toggle("hidden");
        });
    </script>
</body>

</html>
