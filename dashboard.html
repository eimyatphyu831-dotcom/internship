<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
    <section class="bg-blue-400 p-6 grid sm:grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
        <div class="bg-white rounded-lg p-4">
            <p>😊</p>
            <h1 class="font-bold">2.4K</h1>
            <p class="text-xs text-gray-500">Page Views</p>
        </div>
        <div class="bg-white rounded-lg p-4">
            <p>😍</p>
            <h1 class="font-bold">8.2K</h1>
            <p class="text-xs text-gray-500">Revenue</p>
        </div>
        <div class="bg-white rounded-lg p-4">
            <p>🤷‍♂️</p>
            <h1 class="font-bold">892</h1>
            <p class="text-xs text-gray-500">New Users</p>
        </div>
        <div class="bg-white rounded-lg p-4">
            <p>⭐</p>
            <h1 class="font-bold">4.9</h1>
            <p class="text-xs text-gray-500">Rating</p>
        </div>
    </section>
</body>

</html>
