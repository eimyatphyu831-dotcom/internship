<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ass5</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        .container {
            width: 240px;
            border: 1px solid rgb(211, 198, 198);
            border-radius: 10px;
            margin: auto;
            margin-top: 100px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            padding: 20px;
            background-color: rgb(255, 255, 255);
        }

        #num {
            width: 100%;
            height: 40px;
            border: 1px solid #eee;
            background-color: white;
            text-align: right;
            font-size: 20px;
            color: rgb(19, 67, 139);
            padding: 5px;
            border-radius: 5px;
            caret-color: transparent;
        }

        #num:focus {
            outline: none;
            border: 1px solid pink;
        }

        .btn {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            margin-top: 20px;
            gap: 15px;
        }

        button {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: none;
            font-size: 15px;
            background-color: palevioletred;
        }

        button:active {
            opacity: 0.6;
        }

        .del {
            color: rgb(150, 13, 36);
        }

        .blue {
            color: rgb(19, 67, 139);
        }

        .pink {
            color: rgb(240, 142, 158);
        }

        .equ {
            background-color: rgb(187, 42, 61);
            color: white;
            width: 100%;
            grid-column: span 4;
            border-radius: 5px;
        }
    </style>
</head>

<body>
    <div class="container">
        <input type="text" id="num" value="0">

        <div class="btn">
            <button class="del" onclick="allClear()">C</button>
            <button class="del" onclick="deleteLast()">⌫</button>
            <button class="blue" onclick="addOperator('%')">%</button>
            <button class="pink" onclick="addOperator('/')">÷</button>

            <button class="blue" onclick="addValue(7)">7</button>
            <button class="blue" onclick="addValue(8)">8</button>
            <button class="blue" onclick="addValue(9)">9</button>
            <button class="pink" onclick="addOperator('*')">×</button>

            <button class="blue" onclick="addValue(4)">4</button>
            <button class="blue" onclick="addValue(5)">5</button>
            <button class="blue" onclick="addValue(6)">6</button>
            <button class="pink" onclick="addOperator('-')">-</button>

            <button class="blue" onclick="addValue(1)">1</button>
            <button class="blue" onclick="addValue(2)">2</button>
            <button class="blue" onclick="addValue(3)">3</button>
            <button class="pink" onclick="addOperator('+')">+</button>

            <button class="blue" onclick="addParenthesis('(')">(</button>
            <button class="blue" onclick="addParenthesis(')')">)</button>
            <button class="blue" onclick="addValue(0)">0</button>
            <button class="blue" onclick="addDot()">.</button>
            <button class="equ" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        let ans = document.getElementById("num");

        function addOperator(opera) {
            ans.style.caretColor = "transparent";
            let start = ans.selectionStart;
            let end = ans.selectionEnd;
            let current = ans.value;
            if (current === "Error!" || current === "Can't divide by zero!") {
                ans.value = opera;
                ans.setSelectionRange(1, 1);
                ans.focus();
                return;
            }
            let before = current.substring(0, start);
            let after = current.substring(end);
            let lastChar = before.slice(-1);
            let firstCharAfter = after.charAt(0);
            let operators = ['+', '-', '*', '/', '%'];

            if (operators.includes(lastChar) || operators.includes(firstCharAfter)) {
                ans.focus();
                return;
            }
            if (before === '' && opera !== '-') {
                ans.focus();
                return;
            }

            ans.style.caretColor = "transparent";
            ans.value = before + opera + after;
            ans.setSelectionRange(start + 1, start + 1);
            ans.focus();
        }

        function addValue(data) {
            let start = ans.selectionStart;
            let end = ans.selectionEnd;
            let current = ans.value;
            if (current === "Error!" || current === "Can't divide by zero!") {
                ans.value = data;
                ans.setSelectionRange(1, 1);
                ans.focus();
                return;
            }
            if (isNaN(current) &&
                current !== "0" &&
                current !== "" &&
                !current.includes('+') &&
                !current.includes('-') &&
                !current.includes('*') &&
                !current.includes('/') &&
                !current.includes('%') &&
                !current.includes('(') &&
                !current.includes(')')) {

                ans.value = data;
                ans.setSelectionRange(1, 1);
                ans.focus();
                return;
            }

            let before = current.substring(0, start);
            let after = current.substring(end);

            if (current === '0') {
                ans.value = data;
                ans.setSelectionRange(1, 1);
            } else {
                ans.value = before + data + after;
                ans.setSelectionRange(start + 1, start + 1);
            }
            ans.focus();
        }

        function allClear() {
            ans.value = "0";
            ans.focus();
        }

        function deleteLast() {
            let start = ans.selectionStart;
            let end = ans.selectionEnd;
            let current = ans.value;

            if (start !== end) {

                ans.value = current.substring(0, start) + current.substring(end);
                ans.setSelectionRange(start, start);
            } else if (start > 0) {

                ans.value = current.substring(0, start - 1) + current.substring(end);
                ans.setSelectionRange(start - 1, start - 1);
            }

            if (ans.value === "") ans.value = "0";
            ans.focus();
        }

        function calculate() {
            try {
                let exp = ans.value;
                let openCount = (exp.match(/\(/g) || []).length;
                let closeCount = (exp.match(/\)/g) || []).length;
                if (openCount !== closeCount) {
                    ans.focus();
                    return;
                }
                exp = exp.replace(/×/g, '*').replace(/÷/g, '/');
                exp = exp.replace(/(\d+\.?\d*)%(\d?)/g, function (match, number, nextDigit) {
                    if (nextDigit !== "") {
                        return number + "%" + nextDigit;
                    } else {
                        return "(" + number + "/100)";
                    }
                });
                exp = exp.replace(/\)\(/g, ')*(');
                exp = exp.replace(/(\d)\(/g, '$1*(');
                exp = exp.replace(/\)(\d)/g, ')*$1');
                if (exp.includes("/0") && !exp.includes("/0.")) {
                    ans.value = "Can't divide by zero!";
                    return;
                }
                let result = eval(exp);
                if (Number.isInteger(result)) {
                    ans.value = result;
                } else {
                    ans.value = parseFloat(result.toFixed(6));
                }
            } catch (error) {
                ans.value = "Error!";
            }
            ans.focus();
        }

        function addDot() {
            let start = ans.selectionStart;
            let end = ans.selectionEnd;
            let before = ans.value.substring(0, start);
            let after = ans.value.substring(end);
            let lastPart = before.split(/[\+\-\*\/\%]/).pop();

            if (!lastPart.includes('.')) {
                ans.value = before + '.' + after;
                ans.setSelectionRange(start + 1, start + 1);
            }
            ans.focus();
        }

        function addParenthesis(p) {
            let start = ans.selectionStart;
            let end = ans.selectionEnd;
            let current = ans.value;
            let before = current.substring(0, start);
            let after = current.substring(end);
            let openCount = (current.match(/\(/g) || []).length;
            let closeCount = (current.match(/\)/g) || []).length;
            if (p === ")" && openCount <= closeCount) {
                ans.focus();
                return;
            }
            if (current === '0') {
                ans.value = p;
                ans.setSelectionRange(1, 1);
            } else {
                ans.value = before + p + after;
                ans.setSelectionRange(start + 1, start + 1);
            }

            ans.focus();
        }

        document.getElementById("num").addEventListener("click", function () {
            this.style.caretColor = "auto";
        });
        document.getElementById("num").addEventListener("blur", function () {
            this.style.caretColor = "transparent";
        });
    </script>
</body>

</html>
