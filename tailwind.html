<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
    <div class="flex gap-10 max-w-md mx-auto mt-20 p-6 rounded-lg bg-gray-300 shadow-lg">
       <section class="gap-4 flex flex-col">
            <h2 class="font-bold text-lg">Update Variables</h2>
            <label for="name" class="text-base">Name(String):</label>
            <input class="border-4 border-gray-300 rounded-md" type="text" id="name" value="Alex Walker" oninput="resultValue()">
            <label for="age" class="text-base">Age(Number):</label>
            <input class="border-4 border-gray-300 rounded-md" type="number" id="age" value="28" oninput="resultValue()">
            <label for="vipStatus" class="text-base">VIP Status(Boolean):</label>
            <input type="checkbox" id="vipStatus" oninput="resultValue()">
            <label for="cardColor" class="text-base">Card Color:</label>
            <input type="color" id="cardColor" oninput="resultValue()">
        </section>

        <section>
            <h2 class="font-bold text-lg">Live DOM Output</h2>
            <div class="w-40 border border-black rounded-md bg-white p-4 mt-6" id="colorValue">
                <p class="w-full bg-yellow-500 font-bold rounded-xl text-center" id="vipOutput">VIP MEMBER</p>
                <p class="font-bold" id="nameOutput">Alex Walker</p>
                <p id="ageOutput">Age:<span>28</span></p>
            </div>
        </section>
    </div>

    <script>
        function resultValue() {
            let name = document.getElementById("name").value;
            let age = document.getElementById("age").value;
            let vipStatus = document.getElementById("vipStatus");
            let cardColor = document.getElementById("cardColor").value;
            let vipOutput = document.getElementById("vipOutput");
            let nameOutput = document.getElementById("nameOutput");
            let ageOutput = document.getElementById("ageOutput");
            let colorValue = document.getElementById("colorValue");
            nameOutput.innerHTML = name;
            ageOutput.innerHTML = "Age:" + age;

            if (vipStatus.checked) {
                vipOutput.innerHTML = "VIP MEMBER";
            }
            else {
                vipOutput.innerHTML = " ";
            }
            colorValue.style.backgroundColor = cardColor;
        }


    </script>
</body>

</html>
