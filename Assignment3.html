<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 20px 30px 20px 50px;
            /* position: fixed; */
        }

        nav {
            width: 100%;
            background-color: #0d0d0e;
            color: white;
            display: flex;
            align-items: center;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
            margin-bottom: 20px;
            justify-content: space-between;

        }

        a {
            color: white;
            text-decoration: none;
        }

        .logo {
            /* padding-left: 57rem; */
            /* margin:auto; */
            display: flex;
            gap: 30px;
        }

        h4 {
            width: 300px;
            height: 50px;
            /* border:1px solid black; */
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgb(135, 157, 181);
        }

        .feature {
            display: flex;
            /* flex-direction:row; */
            justify-content: space-around;
            margin-bottom: 20px;

        }

        .form {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 50%;
            border: 2px solid rgb(242, 245, 248);
            border-radius: 5px;
            padding: 15px;
            background-color: rgb(239, 242, 245);
        }

        .box1 {
            width: 50%;
            border: 1px dashed black;
            border-radius: 5px;
            background-color: rgb(170, 184, 184);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box2 {
            color: white;
            width: 50%;
            padding: 20px;
            border: 1px solid black;
            background-color: rgb(79, 79, 159);
        }

        .container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        button {
            color: white;
            background-color: rgb(18, 94, 165);
            padding: 5px;
            margin: 10px;
        }
    </style>
</head>

<body>
    <h1>CSS Utility Simulator</h1>
    <p>Change the inputs below to see how atomic classes combine to build UIS.</p>
    <nav>
        <span>MyLogo</span>
        <div class="logo">
            <a href="">Home</a>
            <a href="">About</a>
            <a href="">Contact</a>
        </div>
    </nav>
    <div class="feature">
        <h4>Feature1</h4>
        <h4>Feature2</h4>
        <h4>Feature3</h4>
    </div>
    <div class="container">
        <section class="form">
            <h3>Utility Controls</h3>
            <label for="padding" id="padding">Padding(Spacing)</label>
            <select>
                <option value="">Medium(p-8)</option>
            </select>
            <label for="bgtheme" id="bgtheme">Background Theme(Colord)</label>
            <select>
                <option value="">Primary Blue</option>
            </select>
            <label for="txtsize" id="txtsize">Text Size(Typography)</label>
            <select>
                <option value="">Large(text-xl)</option>
            </select>
            <label for="corner" id="corner">Corner Radius(Borders)</label>
            <select>
                <option value="">Square(rounded-none)</option>
            </select>
            <label for="shadow" id="shadow">Shadow(Depth)</label>
            <select>
                <option value="">Medium(shadow-md)</option>
            </select>
        </section>
        <section class="box1">
            <div class="box2">
                <h3>Alex Walker</h3>
                <p>Full-Stack Web Developer building awesome things with TailWind CSS.</p>
            </div>
        </section>
    </div>
    <button type="submit">Submit</button>
    <button type="submit">Hover Me Slowly!</button>
</body>

</html>
